{% extends "base.html" %}
{% block title %}Register — BurnoutGuard{% endblock %}
{% block extra_css %}
<style>
.auth-wrap {
  min-height: calc(100vh - 120px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  position: relative;
  z-index: 1;
}
.auth-card {
  width: 100%;
  max-width: 460px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 2.5rem;
}
.auth-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.4rem; }
.auth-sub   { font-size: 0.875rem; color: var(--fg-muted); margin-bottom: 2rem; }
.auth-footer { text-align:center; margin-top:1.5rem; font-size:0.875rem; color: var(--fg-muted); }
.auth-footer a { color: var(--purple); text-decoration: none; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-sub">Start your 4-week burnout tracking journey</p>
    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="full_name" class="form-control"
               placeholder="Nandini Sharma" required>
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control"
               placeholder="nandini_2024" required minlength="3">
        <div class="form-hint">Minimum 3 characters</div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control"
               placeholder="nandini@rvu.edu.in" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control"
               placeholder="••••••••" required minlength="6">
        <div class="form-hint">Minimum 6 characters</div>
      </div>
      <button type="submit" class="btn btn-primary w-full mt-2">Create Account →</button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
